name: awais_blog
description: A Flutter simple blog app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  go_router: ^13.0.0
  supabase_flutter: ^2.3.0
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.18.1
  uuid: ^4.2.1
  flutter_dotenv: ^5.1.0
  mime: ^1.0.4
  path: ^1.8.3
  path_provider: ^2.1.1
  flutter_image_compress: ^2.1.0
  loading_animation_widget: ^1.2.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - config.env